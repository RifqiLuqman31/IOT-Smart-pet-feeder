<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Feeder Monitoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .main-card { border-radius: 15px; border: none; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .status-indicator { font-size: 0.9rem; font-weight: bold; }
        .btn-feed { padding: 15px 30px; font-weight: bold; border-radius: 50px; transition: 0.3s; }
        .btn-feed:hover { transform: scale(1.05); }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold text-primary">🐾 Pet Feeder IoT</h1>
        <p class="text-muted">Monitoring Real-time & Kontrol Pakan Otomatis</p>
    </div>

    <div class="row g-4 text-center">
        <div class="col-md-4">
            <div class="card main-card p-4">
                <h6 class="text-uppercase text-muted">Berat Pakan saat ini</h6>
                <h2 class="display-4 fw-bold" id="berat">0</h2>
                <span class="text-primary fw-bold">Gram</span>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card main-card p-4">
                <h6 class="text-uppercase text-muted">Stok (Jarak)</h6>
                <h2 class="display-4 fw-bold" id="stok">0</h2>
                <span class="text-success fw-bold">Cm</span>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card main-card p-4">
                <h6 class="text-uppercase text-muted">Status Hewan</h6>
                <h2 class="h3 fw-bold mt-3" id="gerakan">--</h2>
                <span class="status-indicator text-warning" id="status-update">Mencari Data...</span>
            </div>
        </div>
    </div>

    <div class="text-center mt-5">
        <button class="btn btn-primary btn-lg btn-feed shadow" onclick="kirimPakan()">
            🚀 BERI MAKAN MANUAL
        </button>
    </div>
</div>

<script>
    const AUTH_TOKEN = "YEqlZS1zKnV1mDvUK2V-i97XXJXMYUY3";
    const BASE_URL = "https://blynk.cloud/external/api";

    async function fetchData() {
        try {
            // Ambil data V1 (Berat), V2 (Jarak), V3 (Gerakan) secara paralel
            const [v1, v2, v3] = await Promise.all([
                fetch(`${BASE_URL}/get?token=${AUTH_TOKEN}&V1`).then(r => r.text()),
                fetch(`${BASE_URL}/get?token=${AUTH_TOKEN}&V2`).then(r => r.text()),
                fetch(`${BASE_URL}/get?token=${AUTH_TOKEN}&V3`).then(r => r.text())
            ]);

            document.getElementById('berat').innerText = v1;
            document.getElementById('stok').innerText = v2;
            document.getElementById('gerakan').innerText = v3;
            document.getElementById('status-update').innerText = "Update: Baru saja";
        } catch (error) {
            console.error("Gagal ambil data:", error);
        }
    }

    function kirimPakan() {
        fetch(`${BASE_URL}/update?token=${AUTH_TOKEN}&V5=1`)
            .then(() => alert("Perintah 'Beri Makan' berhasil dikirim!"));
    }

    // Jalankan update setiap 3 detik
    setInterval(fetchData, 3000);
    fetchData(); // Jalankan sekali saat load
</script>

</body>
</html>
