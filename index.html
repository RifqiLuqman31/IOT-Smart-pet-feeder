<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Pet Feeder Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00c8;
            --dark-bg: #0a0e17;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-bg);
            /* Background efek cahaya neon */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 243, 255, 0.1), transparent 30%),
                radial-gradient(circle at 85% 30%, rgba(255, 0, 200, 0.1), transparent 30%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            overflow-x: hidden;
        }

        /* Desain Kartu Efek Kaca (Glassmorphism) */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
            height: 100%;
        }

        .glass-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 45px 0 rgba(0, 243, 255, 0.15);
            border: 1px solid rgba(0, 243, 255, 0.3);
        }

        /* Tipografi Teks Angka Glowing */
        .value-text {
            font-size: 4rem;
            font-weight: 800;
            background: -webkit-linear-gradient(45deg, var(--neon-cyan), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            margin: 10px 0;
        }

        .unit-text {
            font-size: 1.2rem;
            color: var(--neon-cyan);
            font-weight: 600;
        }

        .label-text {
            font-size: 0.9rem;
            font-weight: 600;
            color: #8b9bb4;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Desain Tombol Hologram/Neon */
        .btn-glow {
            background: transparent;
            color: var(--neon-cyan);
            border: 2px solid var(--neon-cyan);
            padding: 18px 50px;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            cursor: pointer;
            outline: none;
            box-shadow: 0 0 15px transparent;
        }

        .btn-glow:hover {
            background: var(--neon-cyan);
            color: var(--dark-bg);
            box-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan);
            transform: scale(1.05);
        }

        /* Animasi Lampu Status Indikator */
        .status-dot {
            height: 12px;
            width: 12px;
            background-color: #00ff00;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            box-shadow: 0 0 10px #00ff00;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 0, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 255, 0, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 0, 0); }
        }

        .status-text {
            font-size: 0.9rem;
            color: #8b9bb4;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold text-white mb-3" style="letter-spacing: 2px;">
            NEXUS <span style="color: var(--neon-cyan);">FEEDER</span>
        </h1>
        <div class="d-flex justify-content-center align-items-center">
            <span class="status-dot" id="online-dot"></span>
            <span class="status-text" id="status-update">Menghubungkan ke satelit...</span>
        </div>
    </div>

    <div class="row g-4 text-center">
        <div class="col-md-4">
            <div class="glass-card">
                <div class="label-text">Sisa Piring</div>
                <div class="value-text" id="berat">0</div>
                <div class="unit-text">GRAM</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="glass-card">
                <div class="label-text">Jarak Sensor Stok</div>
                <div class="value-text" id="stok">0</div>
                <div class="unit-text">CENTIMETER</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="glass-card">
                <div class="label-text">Radar Gerakan</div>
                <div class="value-text" id="gerakan" style="font-size: 2.5rem; margin-top: 30px;">--</div>
            </div>
        </div>
    </div>

    <div class="text-center mt-5 pt-4">
        <button class="btn-glow" onclick="kirimPakan()" id="btn-feed">
            ⏻ INIT FEED SEQUENCE
        </button>
    </div>
</div>

<script>
    // Konfigurasi API Blynk Kamu
    const AUTH_TOKEN = "YEqlZS1zKnV1mDvUK2V-i97XXJXMYUY3";
    const BASE_URL = "https://blynk.cloud/external/api";

    async function fetchData() {
        try {
            const [v1, v2, v3] = await Promise.all([
                fetch(`${BASE_URL}/get?token=${AUTH_TOKEN}&V1`).then(r => r.text()),
                fetch(`${BASE_URL}/get?token=${AUTH_TOKEN}&V2`).then(r => r.text()),
                fetch(`${BASE_URL}/get?token=${AUTH_TOKEN}&V3`).then(r => r.text())
            ]);

            // Update Angka
            document.getElementById('berat').innerText = v1;
            document.getElementById('stok').innerText = v2;
            document.getElementById('gerakan').innerText = v3;

            // Indikator Online
            document.getElementById('status-update').innerText = "Sistem Online | Real-time Sync";
            document.getElementById('online-dot').style.backgroundColor = "#00ff00";
            document.getElementById('online-dot').style.boxShadow = "0 0 10px #00ff00";

        } catch (error) {
            console.error("Gagal ambil data:", error);
            document.getElementById('status-update').innerText = "Koneksi Terputus!";
            document.getElementById('online-dot').style.backgroundColor = "#ff0000";
            document.getElementById('online-dot').style.boxShadow = "0 0 10px #ff0000";
        }
    }

    function kirimPakan() {
        const btn = document.getElementById('btn-feed');
        btn.innerText = "PROCESSING...";
        
        fetch(`${BASE_URL}/update?token=${AUTH_TOKEN}&V5=1`)
            .then(() => {
                setTimeout(() => {
                    btn.innerText = "✔️ SUCCESS";
                    setTimeout(() => {
                        btn.innerText = "⏻ INIT FEED SEQUENCE";
                    }, 2000);
                }, 500);
            })
            .catch(() => {
                alert("Gagal menghubungi server!");
                btn.innerText = "⏻ INIT FEED SEQUENCE";
            });
    }

    // Auto-update setiap 2.5 detik
    setInterval(fetchData, 2500);
    fetchData(); // Panggil pertama kali
</script>

</body>
</html>
