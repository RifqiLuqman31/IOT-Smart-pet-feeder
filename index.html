<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Pet Feeder</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f12;
            --surface: #161a20;
            --surface-2: #1e232c;
            --border: rgba(255,255,255,0.07);
            --accent: #c8f03c;
            --accent-dim: rgba(200,240,60,0.12);
            --accent-glow: rgba(200,240,60,0.25);
            --text: #e8edf5;
            --muted: #5a6478;
            --success: #c8f03c;
            --danger: #ff5c5c;
            --orange: #ff9a3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 32px 24px;
            overflow-x: hidden;
        }

        /* BG grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            max-width: 960px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 48px;
            flex-wrap: wrap;
            gap: 16px;
            animation: fadeDown 0.6s ease both;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-icon {
            width: 48px;
            height: 48px;
            background: var(--accent);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .brand-text h1 {
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text);
            line-height: 1.1;
        }

        .brand-text p {
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 3px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* STATUS BADGE */
        .status-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 8px 18px 8px 12px;
        }

        .pulse-ring {
            position: relative;
            width: 10px;
            height: 10px;
        }

        .pulse-ring .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--muted);
            position: absolute;
            transition: 0.4s;
        }

        .pulse-ring .ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid var(--muted);
            animation: none;
            opacity: 0;
            transition: 0.4s;
        }

        .pulse-ring.online .dot { background: var(--success); }
        .pulse-ring.online .ring {
            border-color: var(--success);
            animation: ripple 1.8s infinite;
            opacity: 1;
        }

        .pulse-ring.offline .dot { background: var(--danger); }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 0.7; }
            100% { transform: scale(2.8); opacity: 0; }
        }

        .status-label {
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: var(--muted);
            transition: 0.3s;
        }

        .status-badge.online .status-label { color: var(--success); }
        .status-badge.offline .status-label { color: var(--danger); }

        /* TIMESTAMP */
        .timestamp {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            color: var(--muted);
            text-align: right;
            margin-top: 4px;
        }

        /* STAT CARDS */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 640px) {
            .cards-grid { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 36px 32px 32px;
            min-height: 210px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: border-color 0.3s, transform 0.3s;
            animation: fadeUp 0.6s ease both;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }

        .card:hover {
            border-color: rgba(200,240,60,0.3);
            transform: translateY(-3px);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(200,240,60,0.4), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .card:hover::before { opacity: 1; }

        .card-tag {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            font-weight: 500;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .card-tag span {
            width: 20px;
            height: 1px;
            background: var(--muted);
            display: inline-block;
        }

        .card-value {
            font-size: 3.8rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -3px;
            color: var(--text);
            transition: color 0.3s;
            margin: 12px 0 8px;
        }

        .card-unit {
            display: block;
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* Motion card special */
        .motion-active .card-value {
            color: var(--accent) !important;
        }

        .motion-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--muted);
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
            transition: 0.3s;
        }

        .motion-active .motion-indicator {
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* PROGRESS BAR SECTION */
        .progress-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px 36px;
            margin-bottom: 20px;
            animation: fadeUp 0.6s 0.35s ease both;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .progress-label {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .progress-pct {
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent);
            font-weight: 500;
        }

        .progress-track {
            height: 10px;
            background: var(--surface-2);
            border-radius: 100px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 100px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 12px var(--accent-glow);
            width: 0%;
        }

        /* FEED BUTTON AREA */
        .feed-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 36px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            flex-wrap: wrap;
            animation: fadeUp 0.6s 0.45s ease both;
        }

        .feed-info h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .feed-info p {
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.5px;
        }

        .btn-feed {
            background: var(--accent);
            color: #0d0f12;
            border: none;
            padding: 18px 44px;
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .btn-feed::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0);
            transition: 0.2s;
        }

        .btn-feed:hover:not(:disabled)::before {
            background: rgba(0,0,0,0.1);
        }

        .btn-feed:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .btn-feed:active:not(:disabled) {
            transform: scale(0.97);
        }

        .btn-feed:disabled {
            background: var(--surface-2);
            color: var(--muted);
            cursor: not-allowed;
        }

        /* STATUS HINT */
        .hint-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'DM Mono', monospace;
            font-size: 0.68rem;
            color: var(--muted);
            background: var(--surface-2);
            border-radius: 100px;
            padding: 5px 14px;
            margin-top: 10px;
            transition: 0.3s;
        }

        .hint-pill.success { color: var(--success); }
        .hint-pill.loading { color: var(--orange); }
        .hint-pill.error { color: var(--danger); }

        /* LOG SECTION */
        .log-section {
            margin-top: 20px;
            animation: fadeUp 0.6s 0.55s ease both;
        }

        .log-title {
            font-family: 'DM Mono', monospace;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .log-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .log-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .log-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'DM Mono', monospace;
            font-size: 0.7rem;
            animation: slideIn 0.3s ease;
        }

        .log-time { color: var(--muted); flex-shrink: 0; }
        .log-msg { color: var(--text); }
        .log-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
        }
        .log-dot.info { background: var(--muted); }
        .log-dot.warn { background: var(--orange); }
        .log-dot.err { background: var(--danger); }

        /* ANIMATIONS */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>
<div class="wrapper">

    <!-- HEADER -->
    <header>
        <div class="brand">
            <div class="brand-icon">🐾</div>
            <div class="brand-text">
                <h1>Smart Pet Feeder</h1>
                <p>Real-time monitoring system</p>
            </div>
        </div>
        <div>
            <div class="status-badge" id="status-badge">
                <div class="pulse-ring" id="pulse-ring">
                    <div class="dot"></div>
                    <div class="ring"></div>
                </div>
                <span class="status-label" id="status-label">Menghubungkan...</span>
            </div>
            <div class="timestamp" id="timestamp">--:--:--</div>
        </div>
    </header>

    <!-- STAT CARDS -->
    <div class="cards-grid">
        <div class="card">
            <div class="card-tag"><span></span> Wadah Pakan</div>
            <div class="card-value" id="berat">—</div>
            <span class="card-unit">GRAM TERSISA</span>
        </div>
        <div class="card">
            <div class="card-tag"><span></span> Level Stok</div>
            <div class="card-value" id="stok">—</div>
            <span class="card-unit">CM KEDALAMAN</span>
        </div>
        <div class="card" id="motion-card">
            <div class="card-tag"><span></span> Aktivitas</div>
            <div class="card-value" id="gerakan" style="font-size:2rem; letter-spacing:-0.5px; margin-top:auto;">
                <span class="motion-indicator"></span>Memuat...
            </div>
            <span class="card-unit" id="motion-sub">SENSOR PIR</span>
        </div>
    </div>

    <!-- PROGRESS BAR -->
    <div class="progress-section">
        <div class="progress-header">
            <span class="progress-label">Estimasi Kapasitas Pakan</span>
            <span class="progress-pct" id="pct-label">—%</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>

    <!-- FEED BUTTON -->
    <div class="feed-section">
        <div>
            <div class="feed-info">
                <h2>Beri Pakan Manual</h2>
                <p>Aktifkan servo untuk mengeluarkan pakan sekarang</p>
            </div>
            <div class="hint-pill" id="hint-pill">
                ⬡ Menunggu perintah
            </div>
        </div>
        <button class="btn-feed" id="btn-feed" onclick="kirimPakan()">
            ▶ Beri Pakan
        </button>
    </div>

    <!-- LOG -->
    <div class="log-section">
        <div class="log-title">Activity Log</div>
        <ul class="log-list" id="log-list"></ul>
    </div>

</div>

<script>
    const AUTH_TOKEN = "YEqlZS1zKnV1mDvUK2V-i97XXJXMYUY3";
    const BASE_URL   = "https://blynk.cloud/external/api";
    const MAX_BERAT  = 500; // gram maks untuk progress bar (sesuaikan)

    /* ─── LOG ─────────────────────────────────────────── */
    function addLog(msg, type = 'info') {
        const list = document.getElementById('log-list');
        const now  = new Date().toLocaleTimeString('id-ID', {hour12: false});
        const li   = document.createElement('li');
        li.className = 'log-item';
        li.innerHTML = `
            <span class="log-dot ${type}"></span>
            <span class="log-time">${now}</span>
            <span class="log-msg">${msg}</span>
        `;
        list.prepend(li);
        // Maks 6 log
        while (list.children.length > 6) list.removeChild(list.lastChild);
    }

    /* ─── HINT PILL ───────────────────────────────────── */
    function setHint(msg, type = '') {
        const el = document.getElementById('hint-pill');
        el.className = 'hint-pill ' + type;
        el.textContent = msg;
    }

    /* ─── TIMESTAMP ───────────────────────────────────── */
    function updateTimestamp() {
        document.getElementById('timestamp').textContent =
            'Update: ' + new Date().toLocaleTimeString('id-ID', {hour12: false});
    }

    /* ─── FETCH DATA ──────────────────────────────────── */
    async function fetchData() {
        try {
            const [v1, v2, v3] = await Promise.all([
                fetch(`${BASE_URL}/get?token=${AUTH_TOKEN}&V1`).then(r => r.text()),
                fetch(`${BASE_URL}/get?token=${AUTH_TOKEN}&V2`).then(r => r.text()),
                fetch(`${BASE_URL}/get?token=${AUTH_TOKEN}&V3`).then(r => r.text())
            ]);

            const berat = parseFloat(v1) || 0;
            const stok  = parseFloat(v2) || 0;
            const gerak = v3.trim();

            // Update cards
            document.getElementById('berat').textContent = berat;
            document.getElementById('stok').textContent  = stok;

            // Progress bar
            const pct = Math.min(100, Math.round((berat / MAX_BERAT) * 100));
            document.getElementById('progress-fill').style.width = pct + '%';
            document.getElementById('pct-label').textContent = pct + '%';

            // Motion
            const motionCard = document.getElementById('motion-card');
            const motionEl   = document.getElementById('gerakan');
            const motionSub  = document.getElementById('motion-sub');
            if (gerak === "1") {
                motionCard.classList.add('motion-active');
                motionEl.innerHTML = '<span class="motion-indicator"></span>Ada Aktivitas';
                motionSub.textContent = 'HEWAN TERDETEKSI';
            } else {
                motionCard.classList.remove('motion-active');
                motionEl.innerHTML = '<span class="motion-indicator"></span>Siaga';
                motionSub.textContent = 'TIDAK ADA AKTIVITAS';
            }

            // Status online
            const badge = document.getElementById('status-badge');
            const ring  = document.getElementById('pulse-ring');
            badge.className = 'status-badge online';
            ring.className  = 'pulse-ring online';
            document.getElementById('status-label').textContent = 'Terhubung';

            updateTimestamp();

        } catch (err) {
            console.error(err);
            const badge = document.getElementById('status-badge');
            const ring  = document.getElementById('pulse-ring');
            badge.className = 'status-badge offline';
            ring.className  = 'pulse-ring offline';
            document.getElementById('status-label').textContent = 'Terputus';
            addLog('Gagal mengambil data dari server.', 'err');
        }
    }

    /* ─── FEED COMMAND ────────────────────────────────── */
    async function kirimPakan() {
        const btn = document.getElementById('btn-feed');
        btn.disabled = true;
        btn.textContent = '⏳ Mengirim...';
        setHint('⬡ Menghubungi kontroler...', 'loading');
        addLog('Perintah pakan dikirim ke perangkat.', 'warn');

        try {
            await fetch(`${BASE_URL}/update?token=${AUTH_TOKEN}&V5=1`);
            await new Promise(r => setTimeout(r, 900));

            btn.textContent = '✓ Berhasil!';
            setHint('✓ Pakan berhasil dikeluarkan', 'success');
            addLog('Servo aktif — pakan telah dikeluarkan.', 'info');

            setTimeout(() => {
                btn.disabled = false;
                btn.textContent = '▶ Beri Pakan';
                setHint('⬡ Siap untuk pemberian berikutnya', '');
            }, 3000);

        } catch(e) {
            btn.disabled = false;
            btn.textContent = '▶ Coba Lagi';
            setHint('✕ Gagal terhubung ke perangkat', 'error');
            addLog('Error: koneksi ke feeder gagal.', 'err');
        }
    }

    // Jalankan
    fetchData();
    setInterval(fetchData, 2000);
    addLog('Dashboard dimulai.', 'info');
</script>
</body>
</html>
